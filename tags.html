---
layout: default
title: Tags
---

<h1>Tags</h1>

<div>
{% for tag in site.tags %}
    <a href="#{{ tag[0] }}">{{ tag[0] }}</a>
{% endfor %}
</div>

<hr>

{% for tag in site.tags %}
<h2 id="{{ tag[0] }}">{{ tag[0] }}</h2>

<ul>
{% for post in tag[1] %}
    <li>
        <a href="{{ post.url | relative_url }}">
            {{ post.title }}
        </a>
    </li>
{% endfor %}
</ul>

{% endfor %}
